<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Trash - Anime Notes</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="top-bar detail-bar">
    <button id="btnBack" class="back-btn">← Back</button>
    <span class="page-title">Trash</span>
    <button id="btnEmptyTrash" class="danger-btn" title="Empty Trash">🗑</button>
  </header>

  <main id="trashList" class="anime-list"></main>
  <div id="emptyState" class="empty hidden">
    <p>Trash is empty.</p>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal hidden">
  <div class="modal-content confirm">
    <p id="confirmText">Are you sure?</p>
    <div class="confirm-btns">
      <button id="confirmNo">Cancel</button>
      <button id="confirmYes" class="danger">Delete</button>
    </div>
  </div>
</div>

<script src="db.js"></script>
<script src="trash.js"></script>
</body>
</html>
